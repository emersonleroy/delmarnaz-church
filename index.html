<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delmar Church of Nazarene</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
    <script>
        // Check if this is a Netlify Identity callback (has hash fragment)
        if (window.location.hash) {
            // Redirect to admin page to handle confirmation/recovery
            window.location.href = '/admin/' + window.location.hash;
        } else {
            // Normal redirect to English homepage
            window.location.href = '/en/';
        }
    </script>

    <noscript>
        <meta http-equiv="refresh" content="0; url=/en/">
    </noscript>
</body>
</html>
